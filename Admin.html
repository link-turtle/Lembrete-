<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Lista de Presença</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght=400;600;700&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #0b1d3a;
            color: #334e68;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .admin-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            padding: 30px;
            border-radius: 24px;
            box-sizing: border-box;
            border: 4px solid #f9c74f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            color: #0b1d3a;
            margin-top: 0;
            text-align: center;
            font-size: 24px;
        }

        .counter {
            font-size: 18px;
            color: #4a90e2;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            background: #f0f7fc;
            padding: 10px;
            border-radius: 12px;
        }

        .guest-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .guest-list li {
            padding: 12px 14px;
            background: #f8fafc;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e2e8f0;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            font-family: 'Quicksand', sans-serif;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>🪐 Painel de Controle - O Pequeno Príncipe 🌹</h1>
        <div class="counter" id="guestCounter">Carregando lista...</div>
        
        <ul id="guestList" class="guest-list"></ul>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAxX817DZJUJzUUg4H5azdKi8vkipyaBus",
            authDomain: "lembrete-f4666.firebaseapp.com",
            databaseURL: "https://lembrete-f4666-default-rtdb.firebaseio.com",
            projectId: "lembrete-f4666",
            storageBucket: "lembrete-f4666.firebasestorage.app",
            messagingSenderId: "879688473621",
            appId: "1:879688473621:web:4b5f48696f94d35844421c",
            measurementId: "G-3CRBEQCG18"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const guestsRef = database.ref('confirmedGuests');

        const guestListElement = document.getElementById('guestList');
        const guestCounterElement = document.getElementById('guestCounter');

        // Escuta o Firebase em tempo real
        guestsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            displayGuests(data);
        });

        function displayGuests(data) {
            guestListElement.innerHTML = '';

            if (!data) {
                guestCounterElement.innerText = 'Total: 0 pessoas confirmadas ❌';
                guestListElement.innerHTML = '<li style="justify-content: center; color: #627d98;">Nenhum convidado confirmado ainda.</li>';
                return;
            }

            const keys = Object.keys(data);
            guestCounterElement.innerText = `Total: ${keys.length} ${keys.length === 1 ? 'pessoa confirmada' : 'pessoas confirmadas'} ✨`;

            keys.forEach((key) => {
                const guest = data[key];
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>👑 <b>${guest}</b></span>
                    <button class="delete-btn" onclick="deleteGuest('${key}')">Remover</button>
                `;
                guestListElement.appendChild(li);
            });
        }

        // Função exclusiva do seu painel para deletar nomes
        window.deleteGuest = function(key) {
            if (confirm("Deseja mesmo remover esse nome da lista oficial?")) {
                database.ref('confirmedGuests/' + key).remove();
            }
        }
    </script>

</body>
</html>
